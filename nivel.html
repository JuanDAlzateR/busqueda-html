<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivel</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h1>Nivel</h1>
    <div class="stats">
      <div class="stat">❤️ Amor: <span id="stat-amor"></span></div>
      <div class="stat">✝️ Fe: <span id="stat-fe"></span></div>
      <div class="stat">💰 Dinero: <span id="stat-dinero"></span></div>
      <div class="stat">⏳ Tiempo: <span id="stat-tiempo"></span></div>
    </div>

    <img id="level-image" src="" alt="Imagen del nivel">
    <p id="level-text">Cargando...</p>

    <input type="text" id="password-input" placeholder="Escribe tu respuesta aquí...">

    <div class="actions-row">
      <button id="confirm-btn">Confirmar ✅</button>
      <div class="stat-inline">⚙️ Acciones: <span id="stat-acciones"></span></div>
    </div>

    <button id="scan-btn">Escanear QR 📷</button>
    <button id="btn-menu-guardar">Guardar y Salir 💾</button>
  </div>

  <script type="module">
    import { loadLevel, processQRCode } from "./game.js";

    // Initialize level on load
    loadLevel();
    processQRCode(); //It is necesary??
  </script>
</body>

</html>
